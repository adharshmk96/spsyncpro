version: "3"

vars:
  BIN_DIR: bin
  SWAG_VERSION: v1.16.6
  SWAG_CMD: go run github.com/swaggo/swag/cmd/swag@{{.SWAG_VERSION}}
  COMPOSE_PROD: docker compose -f ../docker-compose.prod.yml

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  run:
    desc: Start the API server (dev config, SQLite)
    cmds:
      - SPSYNCAPI_METRICS_ENABLED=false SPSYNCAPI_LOG_LEVEL=debug go run . serve

  run:prod:
    desc: Start the API server with config.prod.yaml (PostgreSQL)
    cmds:
      - SPSYNCAPI_METRICS_ENABLED=false go run . serve --config config.prod.yaml

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  e2e:
    desc: Run e2e tests
    cmds:
      - cd e2e && bun test

  spec:
    desc: Generate OpenAPI spec (swagger.json / swagger.yaml)
    cmds:
      - "{{.SWAG_CMD}} init -g main.go -o docs --parseDependency --parseInternal"

  build:
    desc: Build the API binary
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/spsyncapi .

  tidy:
    desc: Tidy Go module dependencies
    cmds:
      - go mod tidy

  temporal:up:
    desc: Start local Temporal (ephemeral start-dev) and UI
    dir: ..
    cmds:
      - docker compose up -d temporal temporal-ui

  temporal:up:prod:
    desc: Start persisted Temporal + app Postgres (production compose)
    dir: ..
    cmds:
      - "{{.COMPOSE_PROD}} up -d"

  db:up:prod:
    desc: Start application PostgreSQL only (production compose)
    dir: ..
    cmds:
      - "{{.COMPOSE_PROD}} up -d app-postgresql"

  worker:
    desc: Start the Temporal worker (dev config, SQLite)
    cmds:
      - go run . worker

  worker:prod:
    desc: Start the Temporal worker with config.prod.yaml (PostgreSQL)
    cmds:
      - go run . worker --config config.prod.yaml
