server:
  host: 0.0.0.0
  port: 8080
  gin_mode: release
  read_timeout: 15s
  write_timeout: 15s
  shutdown_timeout: 10s

log:
  level: info

metrics:
  enabled: false

db:
  driver: sqlite
  sqlite_path: /app/data/spsyncapi.sqlite

temporal:
  host_port: temporal:7233
  namespace: default
  task_queue: spsync-transfer
  reconcile_interval: 2m
