basePath: /api/v1
definitions:
  auth.MemberDetails:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
    type: object
  backupjob.BackupJobDetails:
    properties:
      active:
        type: boolean
      created_at:
        type: string
      end_at:
        type: string
      id:
        type: string
      job_config:
        $ref: '#/definitions/backupjob.JobConfigDetails'
      last_run:
        type: string
      next_run:
        type: string
      schedule:
        $ref: '#/definitions/backupjob.ScheduleDetails'
      start_at:
        type: string
      updated_at:
        type: string
    type: object
  backupjob.FilterDetails:
    properties:
      created_after:
        type: string
      created_before:
        type: string
      document_libraries:
        type: string
      max_file_size:
        type: integer
      min_file_size:
        type: integer
      updated_after:
        type: string
      updated_before:
        type: string
    type: object
  backupjob.JobConfigDetails:
    properties:
      bucket_store:
        type: string
      filters:
        $ref: '#/definitions/backupjob.FilterDetails'
      organization:
        type: string
      share_point_site:
        type: string
    type: object
  backupjob.ScheduleDetails:
    properties:
      cron:
        type: string
      interval:
        type: integer
      one_time:
        type: string
    type: object
  bucketstore.BucketStoreDetails:
    properties:
      bucket_name:
        type: string
      bucket_type:
        type: string
      created_at:
        type: string
      id:
        type: string
      updated_at:
        type: string
    type: object
  handlers.backupJobConfigRequest:
    properties:
      bucket_store:
        type: string
      filters:
        $ref: '#/definitions/handlers.backupJobFiltersRequest'
      organization:
        type: string
      share_point_site:
        type: string
    required:
    - bucket_store
    - organization
    - share_point_site
    type: object
  handlers.backupJobFiltersRequest:
    properties:
      created_after:
        type: string
      created_before:
        type: string
      document_libraries:
        items:
          type: string
        type: array
      max_file_size:
        type: integer
      min_file_size:
        type: integer
      updated_after:
        type: string
      updated_before:
        type: string
    type: object
  handlers.backupJobListResponse:
    properties:
      backup_jobs:
        items:
          $ref: '#/definitions/backupjob.BackupJobDetails'
        type: array
    type: object
  handlers.backupJobResponse:
    properties:
      backup_job:
        $ref: '#/definitions/backupjob.BackupJobDetails'
    type: object
  handlers.backupJobScheduleRequest:
    properties:
      cron:
        type: string
      interval:
        type: integer
      one_time:
        type: string
    type: object
  handlers.bucketStoreListResponse:
    properties:
      bucket_stores:
        items:
          $ref: '#/definitions/bucketstore.BucketStoreDetails'
        type: array
    type: object
  handlers.bucketStoreResponse:
    properties:
      bucket_store:
        $ref: '#/definitions/bucketstore.BucketStoreDetails'
    type: object
  handlers.changePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        type: string
    required:
    - current_password
    - new_password
    type: object
  handlers.createBackupJobRequest:
    properties:
      active:
        type: boolean
      end_at:
        type: string
      job_config:
        $ref: '#/definitions/handlers.backupJobConfigRequest'
      last_run:
        type: string
      next_run:
        type: string
      schedule:
        $ref: '#/definitions/handlers.backupJobScheduleRequest'
      start_at:
        type: string
    required:
    - job_config
    - schedule
    type: object
  handlers.createBucketStoreRequest:
    properties:
      bucket_name:
        type: string
      bucket_type:
        type: string
      config:
        items:
          type: integer
        type: array
    required:
    - bucket_name
    - bucket_type
    - config
    type: object
  handlers.createOrganizationRequest:
    properties:
      client_id:
        type: string
      name:
        type: string
      tenant_id:
        type: string
      tenant_secret:
        type: string
    required:
    - client_id
    - name
    - tenant_id
    - tenant_secret
    type: object
  handlers.errorResponse:
    properties:
      error:
        example: invalid request
        type: string
    type: object
  handlers.forgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  handlers.healthResponse:
    properties:
      status:
        type: string
    type: object
  handlers.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handlers.meResponse:
    properties:
      user:
        $ref: '#/definitions/auth.MemberDetails'
    type: object
  handlers.organizationListResponse:
    properties:
      organizations:
        items:
          $ref: '#/definitions/organization.OrganizationDetails'
        type: array
    type: object
  handlers.organizationResponse:
    properties:
      organization:
        $ref: '#/definitions/organization.OrganizationDetails'
    type: object
  handlers.registerRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handlers.resetPasswordRequest:
    properties:
      email:
        type: string
      password:
        type: string
      token:
        type: string
    required:
    - email
    - password
    - token
    type: object
  handlers.successResponse:
    properties:
      success:
        type: boolean
    type: object
  handlers.tokenResponse:
    properties:
      token:
        type: string
    type: object
  handlers.updateBackupJobRequest:
    properties:
      active:
        type: boolean
      end_at:
        type: string
      job_config:
        $ref: '#/definitions/handlers.backupJobConfigRequest'
      last_run:
        type: string
      next_run:
        type: string
      schedule:
        $ref: '#/definitions/handlers.backupJobScheduleRequest'
      start_at:
        type: string
    required:
    - job_config
    - schedule
    type: object
  handlers.updateBucketStoreRequest:
    properties:
      bucket_name:
        type: string
      bucket_type:
        type: string
      config:
        items:
          type: integer
        type: array
    required:
    - bucket_name
    - bucket_type
    type: object
  handlers.updateOrganizationRequest:
    properties:
      client_id:
        type: string
      name:
        type: string
      tenant_id:
        type: string
      tenant_secret:
        type: string
    required:
    - client_id
    - name
    - tenant_id
    type: object
  organization.OrganizationDetails:
    properties:
      client_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      tenant_id:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: HTTP API server for the SPSync platform.
  title: SPSync API
  version: "1.0"
paths:
  /backup-jobs:
    get:
      description: Returns all active backup jobs
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.backupJobListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: List backup jobs
      tags:
      - backup-jobs
    post:
      consumes:
      - application/json
      description: Creates a backup job with schedule and job configuration
      parameters:
      - description: Backup job payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.createBackupJobRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.backupJobResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Create backup job
      tags:
      - backup-jobs
  /backup-jobs/{id}:
    delete:
      description: Marks a backup job inactive; the record is retained
      parameters:
      - description: Backup job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.successResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Delete backup job
      tags:
      - backup-jobs
    get:
      description: Returns an active backup job by ID
      parameters:
      - description: Backup job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.backupJobResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Get backup job
      tags:
      - backup-jobs
    put:
      consumes:
      - application/json
      description: Updates a backup job and replaces schedule + job config
      parameters:
      - description: Backup job ID
        in: path
        name: id
        required: true
        type: string
      - description: Backup job payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.updateBackupJobRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.backupJobResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Update backup job
      tags:
      - backup-jobs
  /bucket-stores:
    get:
      description: Returns all active bucket stores (config is never included)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.bucketStoreListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: List bucket stores
      tags:
      - bucket-stores
    post:
      consumes:
      - application/json
      description: Creates a bucket store; config is stored encrypted and never returned
      parameters:
      - description: Bucket store payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.createBucketStoreRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.bucketStoreResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Create bucket store
      tags:
      - bucket-stores
  /bucket-stores/{id}:
    delete:
      description: Marks a bucket store inactive; the record is retained
      parameters:
      - description: Bucket store ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.successResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Delete bucket store
      tags:
      - bucket-stores
    get:
      description: Returns an active bucket store by ID
      parameters:
      - description: Bucket store ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.bucketStoreResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Get bucket store
      tags:
      - bucket-stores
    put:
      consumes:
      - application/json
      description: Updates a bucket store; omit config to keep the existing value
      parameters:
      - description: Bucket store ID
        in: path
        name: id
        required: true
        type: string
      - description: Bucket store payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.updateBucketStoreRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.bucketStoreResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Update bucket store
      tags:
      - bucket-stores
  /change-password:
    post:
      consumes:
      - application/json
      description: Changes the password for the authenticated member
      parameters:
      - description: Password change payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.changePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.successResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - auth
  /forgot-password:
    post:
      consumes:
      - application/json
      description: Starts a password reset flow for the given email
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.forgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.successResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      summary: Forgot password
      tags:
      - auth
  /health:
    get:
      description: Returns whether the API is running
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.healthResponse'
      summary: Health check
      tags:
      - health
  /login:
    post:
      consumes:
      - application/json
      description: Authenticates a member and returns a JWT access token
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.tokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      summary: Login
      tags:
      - auth
  /logout:
    post:
      description: Revokes the current session
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.successResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /me:
    get:
      description: Returns the authenticated member profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.meResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Current user
      tags:
      - auth
  /organizations:
    get:
      description: Returns all active organizations (secrets are never included)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.organizationListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: List organizations
      tags:
      - organizations
    post:
      consumes:
      - application/json
      description: Creates an organization; tenant_secret is stored encrypted and
        never returned
      parameters:
      - description: Organization payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.createOrganizationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.organizationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Create organization
      tags:
      - organizations
  /organizations/{id}:
    delete:
      description: Marks an organization inactive; the record is retained
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.successResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Delete organization
      tags:
      - organizations
    get:
      description: Returns an active organization by ID
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.organizationResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Get organization
      tags:
      - organizations
    put:
      consumes:
      - application/json
      description: Updates an organization; omit tenant_secret to keep the existing
        value
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      - description: Organization payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.updateOrganizationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.organizationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Update organization
      tags:
      - organizations
  /register:
    post:
      consumes:
      - application/json
      description: Creates a new member account and returns a JWT access token
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.tokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      summary: Register
      tags:
      - auth
  /reset-password:
    post:
      consumes:
      - application/json
      description: Completes a password reset using the emailed token
      parameters:
      - description: Reset payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.resetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.successResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      summary: Reset password
      tags:
      - auth
securityDefinitions:
  BearerAuth:
    description: 'JWT access token. Example: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
