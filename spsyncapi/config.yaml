server:
  host: 0.0.0.0
  port: 8080
  gin_mode: release
  read_timeout: 15s
  write_timeout: 15s
  shutdown_timeout: 10s

log:
  level: info

metrics:
  enabled: true
  service_name: spsyncapi
  otlp_endpoint: localhost:4318
  otlp_insecure: true
  export_interval: 15s

db:
  driver: sqlite
  sqlite_path: ./data/spsyncapi2.sqlite

auth:
  jwt_secret: change-me-in-production
  jwt_issuer: spsyncapi
  access_token_ttl: 15m
  session_ttl: 720h   # 30 days
  password_reset_ttl: 30m

encryption:
  secret: change-me-encryption-key-in-production

temporal:
  host_port: localhost:7233
  namespace: default
  task_queue: spsync-transfer
  reconcile_interval: 2m
  max_concurrent_transfers: 5
