# Production / staging: persisted Temporal + PostgreSQL app DB + containerized API, worker, UI.
services:
  temporal-postgresql:
    image: postgres:16-alpine
    container_name: spsyncapi-temporal-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.29.0
    container_name: spsyncapi-temporal
    restart: unless-stopped
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    environment:
      DB: postgresql
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgresql
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:latest
    container_name: spsyncapi-temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"

  app-postgresql:
    image: postgres:16-alpine
    container_name: spsyncapi-app-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: spsync
      POSTGRES_PASSWORD: spsync
      POSTGRES_DB: spsyncapi
    volumes:
      - app_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spsync -d spsyncapi"]
      interval: 5s
      timeout: 5s
      retries: 10

  spsyncapi:
    build:
      context: ./spsyncapi
      dockerfile: Dockerfile
    image: spsyncpro/spsyncapi:prod
    container_name: spsyncapi
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPSYNCAPI_DB_DRIVER: postgres
      SPSYNCAPI_DB_POSTGRES_DSN: host=app-postgresql port=5432 user=spsync password=spsync dbname=spsyncapi sslmode=disable
      SPSYNCAPI_TEMPORAL_HOST_PORT: temporal:7233
      SPSYNCAPI_METRICS_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      app-postgresql:
        condition: service_healthy
      temporal:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  spsyncapi-worker:
    build:
      context: ./spsyncapi
      dockerfile: Dockerfile
    image: spsyncpro/spsyncapi:prod
    container_name: spsyncapi-worker
    restart: unless-stopped
    command: ["worker"]
    env_file:
      - .env
    environment:
      SPSYNCAPI_DB_DRIVER: postgres
      SPSYNCAPI_DB_POSTGRES_DSN: host=app-postgresql port=5432 user=spsync password=spsync dbname=spsyncapi sslmode=disable
      SPSYNCAPI_TEMPORAL_HOST_PORT: temporal:7233
      SPSYNCAPI_METRICS_ENABLED: "false"
    depends_on:
      app-postgresql:
        condition: service_healthy
      temporal:
        condition: service_started
      spsyncapi:
        condition: service_healthy

  spsyncui:
    build:
      context: ./spsyncui
      dockerfile: Dockerfile
    image: spsyncpro/spsyncui:prod
    container_name: spsyncui
    restart: unless-stopped
    environment:
      SPSYNC_API_URL: http://spsyncapi:8080
    ports:
      - "3000:3000"
    depends_on:
      spsyncapi:
        condition: service_healthy

volumes:
  temporal_pg_data:
  app_pg_data:
