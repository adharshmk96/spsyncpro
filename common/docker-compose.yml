services:
  postgres:
    image: postgres:16-alpine
    container_name: spsyncpro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: spsyncpro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spsyncpro"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/server:1.29.0
    container_name: spsyncpro-temporal
    restart: unless-stopped
    entrypoint: ["temporal"]
    command: ["server", "start-dev", "--ip", "0.0.0.0"]
    ports:
      - "7233:7233"
      - "8233:8233"

  temporal-ui:
    image: temporalio/ui:latest
    container_name: spsyncpro-temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

volumes:
  postgres_data: